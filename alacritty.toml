# --- TMUX AND SSH COMPATIBILITY ---
[env]
TERM = "xterm-256color"

# --- WINDOW DECORATION AND GENERAL LAYOUT ---
[window]
opacity = 1                  # Completely opaque black background
decorations = "Full"         # Keeps the window title bar and borders
title = "root@kali: ~"       # Window title format

startup_mode = "Maximized"   # Maximizes the window to fill the screen on startup

[window.padding]
x = 2
y = 2

# --- FONT ---
[font]
size = 13.0                  # Font size configuration

[font.normal]
family = "Fira Code"
style = "Regular"

[font.bold]
family = "Fira Code"
style = "Bold"

[font.italic]
family = "Fira Code"
style = "Italic"

# Adjusts spacing so letters stay clean and do not overlap:
[font.offset]
x = 0
y = 0

# --- CURSOR SETTINGS ---
[cursor]
style = { shape = "Block", blinking = "On" }

[selection]
save_to_clipboard = true     # Automatically copies selected text to clipboard

[bell]
duration = 0

[colors.primary]
#foreground = "#d8dee9"      #low white
foreground = "#ffffff"       #high white
background = "#000000"       #black

[colors.normal]
black = "#000000"
red = "#ff3b30"
green = "#4cd964"
yellow = "#ffcc00"
blue = "#007aff"
magenta = "#ff2d55"
cyan = "#5ac8fa"
white = "#ffffff"

[colors.bright]
black = "#555555"
red = "#ff6b64"
green = "#72f287"
yellow = "#ffdf4d"
blue = "#4da3ff"
magenta = "#ff6685"
cyan = "#8ee3ff"
white = "#ffffff"

[scrolling]
history = 50000
multiplier = 3
